# DeepfakeBench detector config for ADB Ensemble (Visual + rPPG + Sync)
# This is the primary alignment analysis detector for benchmarking.

model_name: 'adb_ensemble'

# Individual detector checkpoints
visual_pretrained: 'checkpoints/xception_ff_c23.pth'
rppg_pretrained: 'checkpoints/physnet_ubfc.pth'
syncnet_path: 'checkpoints/latentsync_syncnet.pth'

# rPPG parameters (calibrated on FF++ val)
snr_threshold: 1.5
snr_scale: 1.0

# Whisper
whisper_model: 'tiny'
whisper_device: 'cpu'

# Fusion weights (update after scripts/train_fusion.py --stage weighted)
fusion_weights:
  visual: 0.50
  rppg:   0.25
  sync:   0.25
fusion_threshold: 0.50

loss_func: 'cross_entropy'

use_data_augmentation: false

resolution: 256
with_landmark: false
with_mask: false

train_batchSize: 8
test_batchSize: 8
nEpochs: 30
workers: 4

optimizer:
  type: 'adam'
  adam:
    lr: 0.0001
    weight_decay: 0.0
    beta1: 0.9
    beta2: 0.999
    eps: 1.0e-8
    amsgrad: false

lr_scheduler: 'cosine'
lr_T_max: 30
lr_eta_min: 0.0

metric_scoring: 'auc'

compression: 'c23'
frame_num:
  train: 32
  test: 32
video_mode: false
