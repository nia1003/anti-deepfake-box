# DeepfakeBench detector config for ADB rPPG Detector (PhysNet + SNR)
# Note: video_mode must be true for temporal PhysNet inference.

model_name: 'adb_rppg'

# Pretrained PhysNet weights (UBFC-rPPG pretrained)
rppg_pretrained: 'checkpoints/physnet_ubfc.pth'

# SNR-to-fake scoring parameters (calibrate via scripts/calibrate_snr.py)
snr_threshold: 1.5
snr_scale: 1.0

loss_func: 'cross_entropy'

use_data_augmentation: false  # SNR-based detection does not benefit from augmentation

resolution: 128
with_landmark: false
with_mask: false

train_batchSize: 8   # smaller due to 180 frames per video
test_batchSize: 8
nEpochs: 10
workers: 4

optimizer:
  type: 'adam'
  adam:
    lr: 0.0001
    weight_decay: 0.0
    beta1: 0.9
    beta2: 0.999
    eps: 1.0e-8
    amsgrad: false

lr_scheduler: null
metric_scoring: 'auc'

compression: 'c23'
frame_num:
  train: 180   # rPPG requires long temporal sequences
  test: 180
video_mode: true
clip_size: 180
