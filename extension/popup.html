<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width:220px; padding:12px; font-family:monospace; font-size:13px; }
  button {
    width:100%; padding:8px; margin-top:8px; cursor:pointer;
    border:none; border-radius:4px; font-size:13px;
  }
  button:disabled { opacity:0.5; cursor:not-allowed; }
  #toggle        { background:#3a7; color:#fff; }
  #toggle.off    { background:#e55; }
  #report        { background:#46a; color:#fff; }
  .label         { color:#555; font-size:11px; margin-top:8px; }
  #reportStatus  { color:#888; font-size:10px; min-height:14px; margin-top:4px; }
  .net-ok  { color:#4c4; }
  .net-err { color:#e55; }
</style>
</head>
<body>
  <b>Anti-Deepfake-Box</b>
  <p class="label">Network: <span id="netStatus">checking…</span></p>
  <button id="toggle">Enable Detection</button>
  <button id="report">Send Email Report</button>
  <p id="reportStatus"></p>
  <p class="label">Server: <span id="srv">checking…</span></p>
  <script src="popup.js"></script>
</body>
</html>
