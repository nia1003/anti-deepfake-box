# Anti-Deepfake-Box: Default Configuration
# Override any section via CLI flags in scripts/.

device: "cpu"   # "cuda" | "cpu"  — changed to cpu for trial run (no CUDA available)

# ------------------------------------------------------------------ #
#  Preprocessing (Single Source of Truth)                             #
# ------------------------------------------------------------------ #
preprocessing:
  fps_target: 25.0
  insightface_model: "buffalo_sc"   # buffalo_l for higher accuracy
  insightface_batch_size: 32
  face_cache_dir: ".face_cache"
  use_face_cache: true
  sample_rate: 16000   # audio extraction sample rate
  channels: 1

# ------------------------------------------------------------------ #
#  Detectors                                                           #
# ------------------------------------------------------------------ #
detectors:
  visual:
    pretrained: ""      # no FF++ checkpoint available; will use EfficientNet fallback
    max_frames: 32
    batch_size: 8
    device: "cpu"

  rppg:
    pretrained: "checkpoints/physnet_ubfc.pth"   # MA-UBFC PhysNet
    snr_threshold: 1.5
    snr_scale: 1.0
    device: "cpu"

  sync:
    syncnet_path: ""    # no SyncNet checkpoint; uses motion heuristic fallback
    whisper_model: "tiny"
    whisper_device: "cpu"
    device: "cpu"

# ------------------------------------------------------------------ #
#  Fusion                                                              #
# ------------------------------------------------------------------ #
fusion:
  mode: "weighted"     # "weighted" | "meta"
  threshold: 0.50      # decision threshold
  weights:
    visual: 0.50
    rppg:   0.25
    sync:   0.25
  meta:
    hidden_dims: [512, 256]
    dropout: 0.3
    input_mode: "scores"   # "scores" | "features" | "both"
    model_path: ""         # path to trained MetaClassifier weights
